<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Fisioterapp</title>

    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.min.css">
</head>

<body>

<section class="text-center screen" id="role-select">

    <h4 class="mt-3 mb-0">FisioterAPP</h4>

    <div class="container" style="font-size: 19px; max-width:400px;">

        <!-- FORM -->
        <form onsubmit="event.preventDefault(); iniciarSesion();">

            <p class="mt-4 pt-0 mb-0 text-center">
                Tu nombre de usuario:
            </p>

            <input id="usuario" type="text" class="form-control mb-3" required>

            <p class="mt-4 pt-0 mb-0 pb-0">
                Tu contraseña
            </p>

            <input id="password" type="password" class="form-control mb-3" required>

            <button class="btn btn-primary w-100" type="submit">
                Iniciar sesión
            </button>

        </form>

    </div>

</section>

<script src="assets/bootstrap/js/bootstrap.min.js"></script>

<script>
async function iniciarSesion() {

    const correo = document.getElementById("usuario").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include", // 🔥 ESTO FALTABA
            body: JSON.stringify({ correo, password })
        });

        const data = await res.json();

        if (res.ok) {
            alert("Login correcto");
            window.location.href = "dashboard-terapeuta-home.html";
        } else {
            alert(data.mensaje);
        }

    } catch (error) {
        console.error(error);
        alert("Error conectando con el servidor");
    }
}
</script>

</body>
</html>
